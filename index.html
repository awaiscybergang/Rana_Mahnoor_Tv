      --surface: #13131f;
      --surface-hover: #1c1c2a;
      --card: #181824;
      --card-border: rgba(255,255,255,0.05);
      --primary: #e50914;      /* YouTube/Netflix style red */
      --primary-glow: #ff4d4d;
      --secondary: #aa2eff;
      --text-main: #ededed;
      --text-dim: #aaaaaa;
      --gradient: linear-gradient(135deg, #e50914, #aa2eff);
      --radius-md: 14px;
      --radius-sm: 10px;

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      scroll-behavior: smooth;
    }

    /* custom scroll */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e2a;
    }
    ::-webkit-scrollbar-thumb {
      background: #e50914;
      border-radius: 10px;
    }

    /* header premium */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(11, 11, 18, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229, 9, 20, 0.2);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {

      align-items: center;
      gap: 14px;
    }

      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
      transition: transform 0.2s ease;
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
    }
    .logo-icon:hover {
      transform: scale(0.98);
    }
    .logo-text h1 {
      font-size: 1.55rem;
      font-weight: 800;
      background: var(--gradient);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo-text p {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

      border: 1px solid rgba(229, 9, 20, 0.3);

      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .wa-premium svg {
      width: 20px;
      fill: #e50914;
    }
    .wa-premium:hover {
      background: #e50914;
      border-color: #e50914;
    }
    .wa-premium:hover svg {
      fill: white;
    }

    .live-badge-premium {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(229, 9, 20, 0.2);
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid rgba(229, 9, 20, 0.5);
      font-weight: 700;
      font-size: 0.8rem;
    }
    .live-dot-red {
      width: 8px;
      height: 8px;
      background: #e50914;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      box-shadow: 0 0 6px #e50914;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1);}
      50% { opacity: 0.5; transform: scale(1.2);}
      100% { opacity: 1; transform: scale(1);}
    }

    /* search premium */
    .search-premium {
      position: relative;
      min-width: 210px;
    }
    .search-premium input {

      border: 1px solid #2a2a38;

      color: white;
      font-size: 0.85rem;
      width: 100%;
      transition: all 0.2s;
    }
    .search-premium input:focus {
      outline: none;
      border-color: #e50914;
      background: #181824;
      box-shadow: 0 0 0 2px rgba(229,9,20,0.2);
    }
    .search-premium svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      color: #aaa;
    }

      background: transparent;
      border-bottom: 1px solid #1e1e2a;

    .cat-chip {
      background: #1a1a28;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #ccc;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

      color: white;
      box-shadow: 0 4px 12px rgba(229,9,20,0.3);
    }

    .nav-btn-premium:hover {

      align-items: baseline;

      background: linear-gradient(135deg, #fff, #e50914);
      background-clip: text;

      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;

    .channel-grid-premium {

      }

</head>

  // ---------- APP STATE ----------
  let currentIndex = -1;       // global index
  let currentCat = "All";
  let currentSearch = "";
  let hls = null;
  let filteredChannels = [];

  const video = document.getElementById("videoPlayer");
  const playerSection = document.getElementById("playerSection");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const errorOverlay = document.getElementById("errorOverlay");
  const nowLogo = document.getElementById("nowPlayingLogo");
  const nowName = document.getElementById("nowPlayingName");
  const gridContainer = document.getElementById("channelGrid");
  const noResultsDiv = document.getElementById("noResultsMsg");
  const chCountSpan = document.getElementById("channelCount");
  const catLabelSpan = document.getElementById("categoryLabel");
  const searchInputDom = document.getElementById("searchInput");

  function updateFilter() {
    filteredChannels = channels.filter(ch => {
      const catMatch = currentCat === "All" || ch.cat === currentCat;
      const searchMatch = ch.name.toLowerCase().includes(currentSearch.toLowerCase());
      return catMatch && searchMatch;
    });
    renderGrid();
  }

  function renderGrid() {
    if (!filteredChannels.length) {
      gridContainer.innerHTML = "";
      noResultsDiv.style.display = "block";
      chCountSpan.innerText = "0 channels";
      return;
    }
    noResultsDiv.style.display = "none";
    chCountSpan.innerText = filteredChannels.length + " channels";
    catLabelSpan.innerText = currentCat === "All" ? "All Channels" : currentCat;
    gridContainer.innerHTML = "";
    filteredChannels.forEach((ch, idx) => {
      const globalIdx = channels.indexOf(ch);
      const card = document.createElement("div");
      card.className = "channel-card-premium";
      if (globalIdx === currentIndex) card.classList.add("playing-active");
      card.innerHTML = `
        <img class="channel-logo-premium" src="${ch.logo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'%3E%3Crect width=\'50\' height=\'50\' fill=\'%23222233\'/%3E%3Ctext x=\'50%25\' y=\'55%25\' text-anchor=\'middle\' fill=\'white\' font-size=\'12\'%3E${ch.name.slice(0,2)}%3C/text%3E%3C/svg%3E'" />
        <div class="channel-name-premium">${ch.name}</div>
      `;
      card.addEventListener("click", () => playChannel(globalIdx));
      gridContainer.appendChild(card);
    });
  }

  function playChannel(globalIdx) {
    const channel = channels[globalIdx];
    if (!channel) return;
    currentIndex = globalIdx;
    playerSection.style.display = "block";
    playerSection.scrollIntoView({ behavior: "smooth", block: "start" });
    nowLogo.src = channel.logo;
    nowName.innerText = channel.name;

    loadingOverlay.style.display = "flex";
    errorOverlay.style.display = "none";
    if (hls) { hls.destroy(); hls = null; }
    video.src = "";

    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
      hls.loadSource(channel.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        loadingOverlay.style.display = "none";
        video.play().catch(e=>console.log);
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) { loadingOverlay.style.display = "none"; errorOverlay.style.display = "flex"; }
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = channel.url;
      video.addEventListener("loadedmetadata", () => { loadingOverlay.style.display = "none"; video.play().catch(e=>{}); }, { once: true });
      video.addEventListener("error", () => { loadingOverlay.style.display = "none"; errorOverlay.style.display = "flex"; });
    } else {
      loadingOverlay.style.display = "none";
      errorOverlay.style.display = "flex";
    }
    renderGrid();
  }

  function retryCurrentStream() { if (currentIndex !== -1) playChannel(currentIndex); }
  window.retryCurrentStream = retryCurrentStream;
  window.prevChannel = () => {
    if (filteredChannels.length === 0 || currentIndex === -1) return;
    const pos = filteredChannels.findIndex(ch => channels.indexOf(ch) === currentIndex);
    const newPos = (pos - 1 + filteredChannels.length) % filteredChannels.length;
    playChannel(channels.indexOf(filteredChannels[newPos]));
  };
  window.nextChannel = () => {
    if (filteredChannels.length === 0 || currentIndex === -1) return;
    const pos = filteredChannels.findIndex(ch => channels.indexOf(ch) === currentIndex);
    const newPos = (pos + 1) % filteredChannels.length;
    playChannel(channels.indexOf(filteredChannels[newPos]));
  };

  // category & search
  document.querySelectorAll(".cat-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCat = btn.dataset.cat;
      updateFilter();
    });
  });
  searchInputDom.addEventListener("input", (e) => { currentSearch = e.target.value; updateFilter(); });
  updateFilter();

  // block devtools clean & no data loss
  document.addEventListener("contextmenu", e => e.preventDefault());
  setInterval(() => { if (window.outerWidth - window.innerWidth > 150) document.body.innerHTML = '<div style="background:#000;color:red;height:100vh;display:flex;align-items:center;justify-content:center;">🔒 DevTools Restricted</div>'; }, 1500);

  // service worker registration for PWA (extra)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW not critical"));
  }
</script>
</body>
</html>
