    { name: "Waseeb", logo: "https://canvas.tamashaweb.com/jazzlive/uploads/channels/logo/waseb-live.webp", url: "https://cdn12isb.tamashaweb.com:8087/YlUHeDQb7a/waseeb-abr/playlist.m3u8", cat: "Religious" },
    { name: "Saudi Makkah", logo: "https://canvas.tamashaweb.com/jazzlive/uploads/channels/logo/saudi-quran-makkah-tv-hd-live.webp", url: "https://cdn12isb.tamashaweb.com:8087/YlUHeDQb7a/Saudimakkah(nw)-abr/playlist.m3u8", cat: "Religious" },

    { name: "Pashto 1", logo: "https://canvas.tamashaweb.com/jazzlive/uploads/channels/logo/HUM-Pashto-Channel-logo.webp", url: "https://cdn12isb.tamashaweb.com:8087/YlUHeDQb7a/Pashto1-abr/playlist.m3u8", cat: "Regional" }
  ];
  // ----------------------- APP STATE -----------------------
  let currentIndex = -1;
  let currentCat = "All";
  let currentSearch = "";
  let hls = null;
  let filtered = [];

  const playerDiv = document.getElementById("playerSection");
  const video = document.getElementById("videoPlayer");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const errorOverlay = document.getElementById("errorOverlay");
  const nowLogo = document.getElementById("nowLogo");
  const nowName = document.getElementById("nowName");
  const gridDiv = document.getElementById("channelGrid");
  const noResultsDiv = document.getElementById("noResults");
  const channelCountSpan = document.getElementById("channelCount");
  const catLabelSpan = document.getElementById("catLabel");
  const searchInput = document.getElementById("searchInput");

  // Categories
  const cats = ["All", "Entertainment", "News", "Sports", "Music", "Kids", "Religious", "Documentary", "Regional"];
  const catStrip = document.getElementById("catStrip");
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-chip" + (c === "All" ? " active" : "");
    btn.innerText = c;
    btn.dataset.cat = c;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCat = c;
      filterAndRender();
    });
    catStrip.appendChild(btn);
  });

  function filterAndRender() {
    filtered = channels.filter(ch => (currentCat === "All" || ch.cat === currentCat) && ch.name.toLowerCase().includes(currentSearch.toLowerCase()));
    if (filtered.length === 0) { noResultsDiv.style.display = "block"; gridDiv.innerHTML = ""; channelCountSpan.innerText = "0"; return; }
    noResultsDiv.style.display = "none";
    channelCountSpan.innerText = filtered.length;
    catLabelSpan.innerText = currentCat === "All" ? "All Channels" : currentCat;
    gridDiv.innerHTML = "";
    filtered.forEach(ch => {
      const globalIdx = channels.indexOf(ch);
      const card = document.createElement("div");
      card.className = "channel-card" + (globalIdx === currentIndex ? " active-channel" : "");
      card.innerHTML = `<img class="channel-logo" src="${ch.logo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 50 50\'%3E%3Crect width=\'50\' height=\'50\' fill=\'%23222233\'/%3E%3Ctext x=\'50%25\' y=\'55%25\' text-anchor=\'middle\' fill=\'white\' font-size=\'12\'%3E${ch.name.slice(0,2)}%3C/text%3E%3C/svg%3E'"><div class="channel-name">${ch.name}</div>`;
      card.addEventListener("click", () => playChannel(globalIdx));
      gridDiv.appendChild(card);
    });
  }

  function playChannel(globalIdx) {
    const ch = channels[globalIdx];
    if (!ch) return;
    currentIndex = globalIdx;
    playerDiv.classList.add("visible");
    playerDiv.scrollIntoView({ behavior: "smooth", block: "start" });
    nowLogo.src = ch.logo;
    nowName.innerText = ch.name;
    loadingOverlay.style.display = "flex";
    errorOverlay.style.display = "none";
    if (hls) { hls.destroy(); hls = null; }
    video.src = "";
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, liveSyncDurationCount: 2, maxBufferLength: 20 });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { loadingOverlay.style.display = "none"; video.play().catch(e=>console.log); });
      hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) { loadingOverlay.style.display = "none"; errorOverlay.style.display = "flex"; } });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = ch.url;
      video.addEventListener("loadedmetadata", () => { loadingOverlay.style.display = "none"; video.play().catch(e=>{}); }, { once: true });
      video.addEventListener("error", () => { loadingOverlay.style.display = "none"; errorOverlay.style.display = "flex"; });
    } else { loadingOverlay.style.display = "none"; errorOverlay.style.display = "flex"; }
    filterAndRender();
    localStorage.setItem("lastChannel", globalIdx);
  }

  window.retryStream = () => { if (currentIndex !== -1) playChannel(currentIndex); };
  document.getElementById("prevBtn").addEventListener("click", () => {
    if (filtered.length === 0 || currentIndex === -1) return;
    const pos = filtered.findIndex(ch => channels.indexOf(ch) === currentIndex);
    const newPos = (pos - 1 + filtered.length) % filtered.length;
    playChannel(channels.indexOf(filtered[newPos]));
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    if (filtered.length === 0 || currentIndex === -1) return;
    const pos = filtered.findIndex(ch => channels.indexOf(ch) === currentIndex);
    const newPos = (pos + 1) % filtered.length;
    playChannel(channels.indexOf(filtered[newPos]));
  });

  searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; filterAndRender(); });
  filterAndRender();

  // load last played channel
  const last = localStorage.getItem("lastChannel");
  if (last && channels[parseInt(last)]) playChannel(parseInt(last));
  else if (channels.length) playChannel(0);

  // touch swipe for next/prev on player
  let touchStartX = 0;
  playerDiv.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; });
  playerDiv.addEventListener("touchend", (e) => {
    const diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 60) diff > 0 ? document.getElementById("prevBtn").click() : document.getElementById("nextBtn").click();
  });
</script>
