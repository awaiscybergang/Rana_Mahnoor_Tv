<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rana Mahnoor Live · Premium TV</title>
  <meta name="description" content="HD Live TV · YouTube style premium experience">
  <meta name="theme-color" content="#e50914">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121e;
      --card: #1a1a2c;
      --primary: #e50914;
      --primary-glow: #ff2a2a;
      --text: #ededed;
      --text-dim: #aaa;
      --radius: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* glass header */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229, 9, 20, 0.3);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #e50914, #ff4d4d);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px #e50914;
    }

    .logo-icon svg {
      width: 28px;
      fill: white;
    }

    .logo-text h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e50914);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logo-text p {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .wa-btn {
      background: rgba(229, 9, 20, 0.2);
      border: 1px solid #e50914;
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .wa-btn svg { width: 22px; fill: #e50914; }
    .wa-btn:hover { background: #e50914; }
    .wa-btn:hover svg { fill: white; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(229,9,20,0.2);
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid rgba(229,9,20,0.5);
      font-weight: bold;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #e50914;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

    .search-box {
      position: relative;
      min-width: 200px;
    }
    .search-box input {
      background: #20202c;
      border: 1px solid #2a2a38;
      border-radius: 40px;
      padding: 10px 18px 10px 42px;
      color: white;
      font-size: 0.85rem;
      width: 100%;
      transition: 0.2s;
    }
    .search-box input:focus {
      border-color: #e50914;
      outline: none;
      box-shadow: 0 0 0 2px rgba(229,9,20,0.3);
    }
    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      color: #aaa;
    }

    /* categories */
    .cat-strip {
      display: flex;
      gap: 12px;
      padding: 14px 20px;
      overflow-x: auto;
      scrollbar-width: thin;
      background: transparent;
      border-bottom: 1px solid #1e1e2a;
    }
    .cat-chip {
      background: #1a1a28;
      border: none;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #ccc;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-chip.active {
      background: #e50914;
      color: white;
      box-shadow: 0 5px 12px rgba(229,9,20,0.4);
    }

    /* player premium */
    .player-section {
      background: #000;
      display: none;
    }
    .player-section.visible {
      display: block;
    }
    .player-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    #videoPlayer {
      width: 100%;
      height: 100%;
      outline: none;
    }
    .player-controls-bar {
      background: var(--surface);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid #262636;
    }
    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .now-playing img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #2a2a3a;
      object-fit: contain;
      border: 1px solid #e50914;
    }
    .nav-btns {
      display: flex;
      gap: 12px;
    }
    .nav-btn {
      background: #23232f;
      border: none;
      padding: 8px 22px;
      border-radius: 32px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    .nav-btn:hover {
      background: #e50914;
      transform: scale(0.96);
    }

    /* grid premium */
    .grid-container {
      padding: 24px 20px;
    }
    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }
    .grid-header h2 {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #fff, #e50914);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 18px;
    }
    .channel-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 16px 8px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .channel-card:hover {
      transform: translateY(-6px);
      border-color: #e50914;
      box-shadow: 0 15px 30px -10px rgba(229,9,20,0.4);
    }
    .channel-card.active-channel {
      border: 2px solid #e50914;
      background: linear-gradient(145deg, #1f1f2e, #161622);
    }
    .channel-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: #0e0e16;
      border-radius: 18px;
      margin: 0 auto 10px;
      padding: 6px;
    }
    .channel-name {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .load-overlay, .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 30;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #3a3a4a;
      border-top: 3px solid #e50914;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn {
      background: #e50914;
      border: none;
      padding: 8px 28px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1e1e2a;
      font-size: 0.7rem;
      color: #777;
    }
    @media (max-width: 600px) {
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
      .logo-text h1 { font-size: 1.2rem; }
    }
  </style>
</head>
